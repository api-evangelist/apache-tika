aid: apache-tika
name: Apache Tika
description: >-
  Apache Tika is a toolkit for detecting and extracting metadata and structured text content
  from over 1,000 file formats including PDF, Microsoft Office (Word, Excel, PowerPoint),
  OpenDocument, HTML, XML, images, audio, video, and archive formats. Tika provides a REST
  API server, Java library, and command-line tool. It is used by Apache Solr, Apache Nutch,
  and many other systems for content extraction and indexing. It is maintained by the Apache
  Software Foundation.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Content Extraction
  - Document Processing
  - Metadata
  - Text Extraction
  - Open Source
created: '2026-03-16'
modified: '2026-04-19'
url: >-
  https://raw.githubusercontent.com/api-evangelist/apache-tika/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: apache-tika:apache-tika-rest-api
    name: Apache Tika REST API
    description: >-
      The Tika Server REST API provides HTTP endpoints for content type detection, text extraction,
      metadata extraction, and language detection from uploaded documents. Key endpoints include:
      PUT /tika for full text extraction, PUT /meta for metadata-only extraction, PUT /detect/stream
      for MIME type detection, PUT /language/stream for language detection, and GET /parsers for
      listing available parsers. The server supports streaming large files and returns JSON or
      plain text responses.
    humanURL: https://cwiki.apache.org/confluence/display/TIKA/TikaServer
    tags:
      - REST
      - Content Extraction
      - Metadata
      - Document Processing
      - Text Extraction
    properties:
      - type: Documentation
        url: https://cwiki.apache.org/confluence/display/TIKA/TikaServer
      - type: Documentation
        url: https://tika.apache.org/
      - url: openapi/apache-tika-openapi.yml
        type: OpenAPI
  - aid: apache-tika:apache-tika-java-api
    name: Apache Tika Java API
    description: >-
      The Tika Java API provides the AutoDetectParser for automatic format detection and parsing,
      Metadata class for reading extracted metadata fields, ContentHandler for streaming SAX-based
      text extraction, and Detector for MIME type identification. The facade Tika class provides
      a simple one-line API for text extraction from any supported format.
    humanURL: https://tika.apache.org/
    tags:
      - Java
      - Content Extraction
      - Parser
      - Metadata
    properties:
      - type: Documentation
        url: https://tika.apache.org/
      - type: APIReference
        url: https://tika.apache.org/1.28/api/
      - type: SDK
        url: https://search.maven.org/search?q=org.apache.tika
        title: Maven Java SDK
